<svg width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="circleGrad512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow512">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Fondo oscuro -->
  <rect width="512" height="512" fill="url(#bgGrad512)" rx="110"/>
  
  <!-- Círculo con gradiente y glow -->
  <circle cx="256" cy="256" r="175" fill="none" stroke="url(#circleGrad512)" stroke-width="10" filter="url(#glow512)"/>
  
  <!-- Emoji 🎯 -->
  <text x="256" y="340" font-size="220" text-anchor="middle" fill="white" filter="url(#glow512)">🎯</text>
</svg>
