<svg width="192" height="192" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Fondo oscuro -->
  <rect width="192" height="192" fill="url(#bgGrad)" rx="42"/>
  
  <!-- Círculo con gradiente y glow -->
  <circle cx="96" cy="96" r="65" fill="none" stroke="url(#circleGrad)" stroke-width="4" filter="url(#glow)"/>
  
  <!-- Emoji 🎯 -->
  <text x="96" y="125" font-size="80" text-anchor="middle" fill="white" filter="url(#glow)">🎯</text>
</svg>
